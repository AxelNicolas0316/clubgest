<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Exitosa — ClubGest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --db-navy:  #0a1628;
            --db-blue:  #0d2a5e;
            --db-gold:  #d4a017;
            --db-gold2: #f0c040;
            --db-muted: #7a9cc4;
            --db-white: #ffffff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--db-navy);
            background: radial-gradient(circle at 50% 50%, var(--db-blue) 0%, var(--db-navy) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--db-white);
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--red), var(--gold), var(--gold2), var(--gold3), var(--red));
            background-size: 300% 100%; animation: glow-line 5s linear infinite;
            box-shadow: 0 0 15px rgba(212,160,23,0.4); z-index: 9999;
        }
        @keyframes glow-line { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

        .success-card {
            background: rgba(13, 26, 56, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 60px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.8) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-container {
            width: 120px;
            height: 120px;
            background: rgba(212, 160, 23, 0.1);
            border: 2px solid var(--db-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.2);
        }

        .icon-container span {
            font-size: 50px;
            animation: iconBounce 2s infinite ease-in-out;
        }

        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .icon-container::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px dashed var(--db-gold);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: var(--db-gold2);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: var(--db-muted);
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--db-gold), var(--db-gold2));
            color: var(--db-navy);
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 18px;
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 800;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(212, 160, 23, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative; overflow: hidden;
        }

        .btn-home::after {
            content: ''; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(25deg); transition: none;
        }

        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(212, 160, 23, 0.5), 0 0 20px rgba(212, 160, 23, 0.2);
            color: var(--db-navy);
        }
        .btn-home:hover::after { animation: shimmer 1.5s infinite; }

        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

        .school-logo-mini {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            padding: 3px;
            border: 2px solid var(--db-gold);
            margin: 40px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0.6;
        }

        .school-logo-mini img {
            width: 105%;
            height: 105%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container">
            <span>✨</span>
        </div>

        <h1>¡Inscripción Exitosa!</h1>
        <p>Tu registro en el club ha sido procesado correctamente. ¡Bienvenido a la comunidad de la Unidad Educativa Fiscomisional Salesiana Don Bosco La Tola!</p>

        <a href="/" class="btn-home">Finalizar y Salir →</a>

        <div class="school-logo-mini">
            <img src="/imagenes/logo_donbosco.jpg" alt="Logo Don Bosco">
        </div>
    </div>

</body>
</html>
